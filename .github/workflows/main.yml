name: Matikkapipeline
on:
  push:
    branches: [ main ]

defaults:
  run:
    working-directory: ./MathWorkshops
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        sdotnet-version: '10.0.x'
    - run: dotnet restore
    - run: dotnet buid
